<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Tanière V5</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="/la-taniere/logo.png">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
body{margin:0;font-family:system-ui;background:#0f172a;color:#fff}
nav{display:flex;align-items:center;padding:12px 20px;background:#020617;border-bottom:2px solid #f97316}
nav h1{color:#f97316;font-size:18px;margin:0;flex:1}
.nav-btn{background:none;border:none;color:#94a3b8;margin:0 6px;cursor:pointer}
.nav-btn.active{color:#f97316}
.page{display:none;padding:20px;max-width:900px;margin:auto}
.page.active{display:block}

button{padding:10px;border:none;border-radius:8px;background:#f97316;color:#fff;cursor:pointer}
input{padding:10px;border-radius:8px;border:none;background:#1e293b;color:#fff;width:100%;margin:5px 0}

.card{background:#1e293b;padding:12px;border-radius:10px;margin:10px 0;display:flex;justify-content:space-between}
.badge{padding:4px 10px;border-radius:20px}
.green{background:#16a34a}
.red{background:#dc2626}

.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center}
.modal{background:#020617;padding:20px;border-radius:12px;width:90%;max-width:400px}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.member-card{border-radius:16px;padding:20px;color:#fff}
.card-green{background:linear-gradient(135deg,#16a34a,#22c55e)}
.card-blue{background:linear-gradient(135deg,#2563eb,#3b82f6)}
.card-orange{background:linear-gradient(135deg,#ea580c,#fb923c)}
.card-expired{background:#374151}

.scan-box{margin-top:20px;padding:20px;border-radius:12px;text-align:center;font-size:18px}
.scan-ok{background:#16a34a}
.scan-bad{background:#dc2626}
</style>
</head>
<body>
<nav>
<h1>🦊 La Tanière</h1>
<button class="nav-btn active" onclick="show('members',this)">Membres</button>
<button class="nav-btn" onclick="show('cards',this)">Cartes</button>
<button class="nav-btn" onclick="show('scan',this)">Scanner</button>
</nav>

<div id="members" class="page active">
<button onclick="openModal()">+ Nouveau membre</button>
<div id="list"></div>
</div>

<div id="cards" class="page">
<div class="cards-grid" id="cardsGrid"></div>
</div>

<div id="scan" class="page">
<video id="video" style="width:100%"></video>
<canvas id="canvas" hidden></canvas>
<div id="result"></div>
<button onclick="startScan()">Scanner</button>
</div>

<div class="modal-bg" id="modalBg">
<div class="modal">
<h3>Ajouter membre</h3>
<input id="prenom" placeholder="Prénom">
<input id="nom" placeholder="Nom">
<input id="email" placeholder="Email">
<input id="tel" placeholder="Téléphone">
<button onclick="saveMember()">Enregistrer</button>
<button onclick="closeModal()">Annuler</button>
</div>
</div>

<script>
let db=JSON.parse(localStorage.getItem('db')||'[]');
function save(){localStorage.setItem('db',JSON.stringify(db));}
function year(){let d=new Date();return(d.getMonth()==11&&d.getDate()>=15)?d.getFullYear()+1:d.getFullYear();}
function valid(m){return m.year>=new Date().getFullYear();}
function color(y){if(y==2026)return'card-green';if(y==2027)return'card-blue';if(y==2028)return'card-orange';return'card-expired';}

function openModal(){modalBg.style.display='flex';}
function closeModal(){modalBg.style.display='none';}

function saveMember(){
let m={id:Date.now().toString(),prenom:prenom.value,nom:nom.value,email:email.value,tel:tel.value,year:year()};
db.push(m);save();closeModal();render();renderCards();}

function render(){list.innerHTML=db.map(m=>`<div class='card'>${m.prenom} ${m.nom}<span class='badge ${valid(m)?'green':'red'}'>${valid(m)?'OK':'EXPIRÉ'}</span></div>`).join('');}

function renderCards(){cardsGrid.innerHTML='';db.forEach(m=>{let d=document.createElement('div');d.className='member-card '+color(m.year);d.innerHTML=`<h3>${m.prenom} ${m.nom}</h3><canvas id='qr-${m.id}'></canvas>`;cardsGrid.appendChild(d);QRCode.toCanvas(document.getElementById('qr-'+m.id),JSON.stringify(m));});}

function show(p,b){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(p).classList.add('active');document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');}

let stream,interval;
function startScan(){navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(s=>{stream=s;video.srcObject=s;interval=setInterval(()=>{canvas.width=video.videoWidth;canvas.height=video.videoHeight;let ctx=canvas.getContext('2d');ctx.drawImage(video,0,0);let img=ctx.getImageData(0,0,canvas.width,canvas.height);let code=jsQR(img.data,img.width,img.height);if(code){clearInterval(interval);stream.getTracks().forEach(t=>t.stop());check(code.data);}},300);});}

function check(data){let m=db.find(x=>JSON.stringify(x)==data);result.innerHTML=m?`<div class='scan-box scan-ok'>${m.prenom}</div>`:`<div class='scan-box scan-bad'>Inconnu</div>`;}

render();renderCards();
</script>
</body>
</html>
