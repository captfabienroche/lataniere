<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>La Tanière - Gestion des membres</title>

<link rel="manifest" href="/la-taniere/manifest.json">
<link rel="icon" href="/la-taniere/logo.png">
<meta name="theme-color" content="#e07b00">

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

<style>
/* === TON DESIGN ORIGINAL CONSERVÉ === */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#1a1a1a;color:#333;}

nav{background:#1a1a1a;padding:0 24px;display:flex;align-items:center;border-bottom:3px solid #e07b00;}
nav img{width:50px;padding:8px 0;}
nav h1{color:#e07b00;font-size:18px;flex:1;margin-left:12px;}

.nav-btn{padding:10px 18px;background:none;border:none;color:#ccc;cursor:pointer;border-bottom:3px solid transparent;}
.nav-btn.active{color:#e07b00;border-bottom-color:#e07b00;}

.page{display:none;padding:24px;max-width:1200px;margin:auto;}
.page.active{display:block;}

.table-wrap{background:#fff;border-radius:10px;overflow:hidden;}
.table-header{padding:16px;display:flex;gap:12px;align-items:center;}
.search-box{padding:8px;border:2px solid #ddd;border-radius:6px;}

table{width:100%;border-collapse:collapse;}
th,td{padding:10px;border-bottom:1px solid #eee;}

.badge{padding:4px 10px;border-radius:20px;font-size:12px;}
.badge-green{background:#d4edda;color:#155724;}
.badge-red{background:#f8d7da;color:#721c24;}

.btn{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;}
.btn-primary{background:#e07b00;color:#fff;}
.btn-success{background:#28a745;color:#fff;}
.btn-danger{background:#dc3545;color:#fff;}
.btn-secondary{background:#6c757d;color:#fff;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:400px;}

.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;}
.member-card{border-radius:14px;padding:20px;color:#fff;position:relative;}
.card-green{background:linear-gradient(135deg,#1a7a3c,#2ecc71);}
.card-blue{background:linear-gradient(135deg,#1a3a7a,#3498db);}
.card-purple{background:linear-gradient(135deg,#5a1a7a,#9b59b6);}
.card-expired{background:#555;}

.card-qr{background:#fff;padding:4px;border-radius:6px;}

.scan-result{padding:20px;border-radius:10px;margin-top:16px;text-align:center;font-weight:bold;}
.scan-ok{background:#d4edda;}
.scan-unknown{background:#f8d7da;}
</style>
</head>

<body>

<nav>
<img src="/la-taniere/logo.png">
<h1>La Tanière</h1>
<button class="nav-btn active" onclick="showPage('members',this)">Membres</button>
<button class="nav-btn" onclick="showPage('cards',this)">Cartes</button>
<button class="nav-btn" onclick="showPage('scanner',this)">Scanner</button>
</nav>

<!-- MEMBERS -->
<div class="page active" id="page-members">
<div class="table-wrap">
<div class="table-header">
<input class="search-box" id="searchInput" placeholder="Rechercher..." oninput="renderMembers()">
<button class="btn btn-primary" onclick="openModal()">+ Ajouter</button>
</div>
<table>
<thead><tr><th>N°</th><th>Prénom</th><th>Nom</th><th>Statut</th><th>Actions</th></tr></thead>
<tbody id="membersTable"></tbody>
</table>
</div>
</div>

<!-- CARDS -->
<div class="page" id="page-cards">
<div class="cards-grid" id="cardsGrid"></div>
</div>

<!-- SCANNER -->
<div class="page" id="page-scanner">
<video id="video" style="width:100%"></video>
<canvas id="canvas" hidden></canvas>
<div id="scanResult"></div>
<button class="btn btn-primary" onclick="startScanner()">Scanner</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
<div class="modal">
<input id="prenom" placeholder="Prénom">
<input id="nom" placeholder="Nom">
<button class="btn btn-primary" onclick="saveMember()">Enregistrer</button>
<button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
</div>
</div>

<script>

let members = JSON.parse(localStorage.getItem("members")||"[]");

function save(){localStorage.setItem("members",JSON.stringify(members));}

function showPage(p,b){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById("page-"+p).classList.add("active");
document.querySelectorAll(".nav-btn").forEach(x=>x.classList.remove("active"));
b.classList.add("active");
}

function openModal(){modal.classList.add("open");}
function closeModal(){modal.classList.remove("open");}

function saveMember(){
members.push({id:Date.now().toString(),prenom:prenom.value,nom:nom.value});
save();
closeModal();
renderMembers();
renderCards();
}

function renderMembers(){
let s=(searchInput.value||"").toLowerCase();
membersTable.innerHTML=members.filter(m=>(m.prenom+m.nom).toLowerCase().includes(s)).map(m=>`
<tr>
<td>${m.id}</td>
<td>${m.prenom}</td>
<td>${m.nom}</td>
<td><span class="badge badge-green">OK</span></td>
<td>
<button class="btn btn-success" onclick="showCard('${m.id}')">Carte</button>
<button class="btn btn-danger" onclick="deleteMember('${m.id}')">X</button>
</td>
</tr>`).join("");
}

function deleteMember(id){
members=members.filter(x=>x.id!==id);
save();
renderMembers();
}

function renderCards(){
cardsGrid.innerHTML="";
members.forEach(m=>{
let d=document.createElement("div");
d.className="member-card card-green";
d.innerHTML=`<h3>${m.prenom} ${m.nom}</h3><canvas id="qr-${m.id}" class="card-qr"></canvas>`;
cardsGrid.appendChild(d);

setTimeout(()=>{
let c=document.getElementById("qr-"+m.id);
if(c) QRCode.toCanvas(c,"ID:"+m.id,{width:70});
},0);
});
}

function showCard(id){
let m=members.find(x=>x.id===id);
let modal=document.createElement("div");
modal.className="modal-overlay open";
modal.innerHTML=`<div class="modal">
<h3>${m.prenom} ${m.nom}</h3>
<canvas id="qr-view"></canvas>
<button onclick="this.closest('.modal-overlay').remove()">Fermer</button>
</div>`;
document.body.appendChild(modal);

setTimeout(()=>{
QRCode.toCanvas(document.getElementById("qr-view"),"ID:"+m.id,{width:120});
},0);
}

function startScanner(){
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s=>{
video.srcObject=s;
setInterval(()=>{
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
let ctx=canvas.getContext("2d");
ctx.drawImage(video,0,0);
let img=ctx.getImageData(0,0,canvas.width,canvas.height);
let code=jsQR(img.data,img.width,img.height);
if(code){
let id=code.data.replace("ID:","");
let m=members.find(x=>x.id===id);
scanResult.innerHTML=m
? `<div class="scan-result scan-ok">✅ ${m.prenom}</div>`
: `<div class="scan-result scan-unknown">❌ Inconnu</div>`;
}
},200);
});
}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("/la-taniere/sw.js");
}

renderMembers();
renderCards();

</script>

</body>
</html>
